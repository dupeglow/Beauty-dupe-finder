<!DOCTYPE html> <html> <head> <title>Dupe Finder</title> <style> body { background:#0f0f0f; color:white; font-family:Arial; text-align:center; padding:40px; } input { padding:10px; width:250px; } button { padding:10px; background:gold; border:none; cursor:pointer; } .card { background:#1a1a1a; margin:10px auto; padding:15px; width:300px; } </style> </head> <body> <h1>Dupe Finder</h1> <p>Search a product</p> <input id="search" placeholder="La Mer, SK-II..."> <button onclick="find()">Find</button> <div id="results"></div> <script> const database = [ { name: "La Mer Moisturizing Cream", brand: "La Mer", price: 350, ingredients: ["mineral oil","glycerin","petrolatum","algae"] }, { name: "Nivea Creme", brand: "Nivea", price: 5, ingredients: ["mineral oil","glycerin","petrolatum"] }, { name: "CeraVe Moisturizing Cream", brand: "CeraVe", price: 15, ingredients: ["glycerin","ceramides","hyaluronic acid"] }, { name: "SK-II Essence", brand: "SK-II", price: 200, ingredients: ["pitera","niacinamide"] }, { name: "Missha Time Revolution Essence", brand: "Missha", price: 30, ingredients: ["fermented yeast","niacinamide"] } ]; function similarity(a, b) { let match = 0; a.forEach(i => { if (b.includes(i)) match++; }); return match / Math.max(a.length, b.length); } function find() { const query = document.getElementById("search").value.toLowerCase(); const results = document.getElementById("results"); const original = database.find(p => p.name.toLowerCase().includes(query)); if (!original) { results.innerHTML = "Product not found"; return; } const dupes = database .filter(p => p !== original) .map(p => ({ ...p, score: similarity(original.ingredients, p.ingredients) })) .sort((a,b) => b.score - a.score) .slice(0,3); results.innerHTML = "<h2>Results:</h2>"; dupes.forEach(p => { const saving = Math.round((1 - p.price / original.price) * 100); results.innerHTML += ` <div class="card"> <h3>${p.name}</h3> <p>${p.brand}</p> <p>Similarity: ${Math.round(p.score*100)}%</p> <p>${saving}% cheaper</p> </div> `; }); } </script> </body> </html>
